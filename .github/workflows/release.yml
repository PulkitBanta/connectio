name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to upload/overwrite assets (for example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - if: ${{ github.event_name == 'push' }}
        uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build:
    needs: release-please
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true') }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: npx electron-builder --publish never

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
          } else {
            $tag = "${{ needs.release-please.outputs.tag_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error "Release tag is empty. Provide workflow_dispatch input tag_name or ensure release-please created a tag."
            exit 1
          }

          $allowedExtensions = @(".dmg", ".zip", ".exe", ".AppImage", ".deb", ".blockmap", ".yml", ".yaml")
          $files = Get-ChildItem -Path dist -File -ErrorAction SilentlyContinue |
            Where-Object {
              $allowedExtensions -contains $_.Extension -and
              $_.Name -notin @("builder-debug.yml", "builder-effective-config.yaml")
            }

          if (-not $files) {
            Write-Host "No release artifacts found in dist/, skipping upload."
            exit 0
          }

          $paths = $files | ForEach-Object { $_.FullName }
          gh release upload $tag $paths --clobber
