<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://unpkg.com 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
      "
    />
    <title>Connectio</title>
    <link rel="stylesheet" href="styles/output.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      .squircle {
        border-radius: 1rem;
        transition:
          border-radius 0.15s ease,
          background-color 0.15s ease;
      }
      .squircle:hover {
        border-radius: 0.6rem;
      }

      #nav {
        transition: width 0.2s ease;
      }

      #nav-toggle i,
      #nav-toggle svg {
        transition: transform 0.2s ease;
      }
      #nav-toggle.active i,
      #nav-toggle.active svg {
        transform: rotate(180deg);
      }
      #nav-toggle.active {
        background-color: rgba(255, 255, 255, 0.12);
        border-radius: 0.6rem;
        color: #e2e8f0;
      }

      #nav.expanded #nav-toggle-wrap {
        justify-content: flex-start;
        width: 100%;
      }
      #nav.expanded #nav-toggle {
        width: 100%;
        justify-content: flex-start;
        gap: 0.75rem;
        padding-inline: 0.75rem;
      }
      #nav.expanded #nav-toggle-label {
        display: inline;
      }
    </style>
  </head>

  <body class="bg-[#0f1117] text-slate-200 h-screen flex overflow-hidden select-none">
    <!-- Config picker -->
    <div id="config-picker" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
      <div class="bg-[#16181f] border border-white/10 rounded-xl p-6 w-96 flex flex-col gap-4 shadow-xl">
        <p class="text-sm font-semibold text-slate-200">Load Config</p>
        <div id="config-list" class="flex flex-col gap-2"></div>
        <div id="config-new-form" class="hidden flex flex-col gap-2">
          <input id="config-new-name" type="text" placeholder="Config name (e.g. Local Dev)"
            class="bg-white/5 border border-white/10 rounded px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors" />
          <div class="flex gap-2 justify-end">
            <button id="config-new-cancel" class="px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-slate-200 hover:bg-white/5 transition-colors">Cancel</button>
            <button id="config-new-confirm" class="px-4 py-2 rounded-lg text-xs bg-emerald-700 hover:bg-emerald-600 text-white transition-colors">Create</button>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <button id="config-new-btn" class="text-xs text-emerald-500 hover:text-emerald-400 transition-colors">+ New config</button>
          <button id="config-picker-close" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Close</button>
        </div>
      </div>
    </div>

    <!-- Save config dialog -->
    <div id="save-config-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
      <div class="bg-[#16181f] border border-white/10 rounded-xl p-6 w-96 flex flex-col gap-4 shadow-xl">
        <p class="text-sm font-semibold text-slate-200">Save Config</p>
        <div class="flex flex-col gap-1">
          <label class="text-xs text-slate-500">Config name</label>
          <input id="save-config-name" type="text"
            class="bg-white/5 border border-white/10 rounded px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors" />
        </div>
        <div class="flex gap-2 justify-end">
          <button id="save-config-cancel" class="px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-slate-200 hover:bg-white/5 transition-colors">Cancel</button>
          <button id="save-config-confirm" class="px-4 py-2 rounded-lg text-xs bg-emerald-700 hover:bg-emerald-600 text-white transition-colors">Save</button>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Import JSON overlay -->
    <div id="import-json-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
      <div class="bg-[#16181f] border border-white/10 rounded-xl p-6 w-[480px] flex flex-col gap-4 shadow-xl">
        <p class="text-sm font-semibold text-slate-200">Import Config from JSON</p>
        <div class="flex flex-col gap-1">
          <label class="text-xs text-slate-500">Config name</label>
          <input id="import-config-name" type="text" placeholder="e.g. Local Dev"
            class="bg-white/5 border border-white/10 rounded px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs text-slate-500">Paste JSON</label>
          <textarea id="import-json-textarea" rows="8" placeholder='{ "apps": [...], "port": 8080 }'
            class="bg-white/5 border border-white/10 rounded px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-white/25 transition-colors resize-none"></textarea>
        </div>
        <div id="import-preview" class="hidden text-xs text-slate-400"></div>
        <div id="import-error" class="hidden text-xs text-red-400"></div>
        <div class="flex gap-2 justify-end">
          <button id="import-json-cancel" class="px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-slate-200 hover:bg-white/5 transition-colors">Cancel</button>
          <button id="import-json-validate" class="px-4 py-2 rounded-lg text-xs bg-white/10 hover:bg-white/15 text-slate-300 transition-colors">Validate</button>
          <button id="import-json-confirm" class="px-4 py-2 rounded-lg text-xs bg-emerald-700 hover:bg-emerald-600 text-white transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled>Import</button>
        </div>
      </div>
    </div>

    <!-- Add proxy modal -->
    <div
      id="modal-overlay"
      class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50"
    >
      <div
        class="bg-[#16181f] border border-white/10 rounded-xl p-6 w-96 flex flex-col gap-4 shadow-xl"
      >
        <p class="text-sm font-semibold text-slate-200">Add Proxy App</p>
        <div class="flex flex-col gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-xs text-slate-500">Name</label>
            <input
              id="modal-name"
              type="text"
              placeholder="e.g. Auth Service"
              class="bg-white/5 border border-white/10 rounded px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors"
            />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs text-slate-500">Target URL</label>
            <input
              id="modal-url"
              type="text"
              placeholder="http://localhost:3001"
              class="bg-white/5 border border-white/10 rounded px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors"
            />
          </div>
        </div>
        <div id="modal-error" class="hidden text-xs text-red-400"></div>
        <div class="flex gap-2 justify-end">
          <button
            id="modal-cancel"
            class="px-4 py-2 rounded-lg text-xs text-slate-400 hover:text-slate-200 hover:bg-white/5 transition-colors"
          >
            Cancel
          </button>
          <button
            id="modal-add"
            class="px-4 py-2 rounded-lg text-xs bg-emerald-700 hover:bg-emerald-600 text-white transition-colors"
          >
            Add
          </button>
        </div>
      </div>
    </div>
    <nav id="nav" class="w-20 flex flex-col bg-[#09090d] py-3 overflow-hidden shrink-0">
      <div id="nav-toggle-wrap" class="flex justify-center px-3 mb-2">
        <button
          id="nav-toggle"
          title="Expand / collapse"
          class="squircle w-10 h-10 flex items-center justify-center bg-white/5 hover:bg-white/10 text-slate-400 hover:text-slate-200 transition-colors"
        >
          <i data-lucide="chevron-right" class="w-4 h-4 shrink-0"></i>
          <span id="nav-toggle-label" class="hidden text-xs font-medium whitespace-nowrap"
            >Collapse</span
          >
        </button>
      </div>

      <div id="proxy-list" class="flex flex-col gap-2 px-3 flex-1"></div>

      <button
        id="add-proxy"
        title="Add a proxy app"
        class="squircle w-10 h-10 flex items-center justify-center bg-white/5 hover:bg-emerald-600 text-slate-400 hover:text-white transition-colors mx-auto"
      >
        <span class="text-xl leading-none shrink-0">+</span>
        <span id="add-proxy-label" class="hidden text-xs font-medium whitespace-nowrap"
          >Add App</span
        >
      </button>
    </nav>

    <div class="w-px bg-white/5 shrink-0"></div>

    <main class="flex-1 flex flex-col overflow-hidden">
      <div
        id="empty-state"
        class="flex-1 flex flex-col items-center justify-center gap-5 text-center px-8"
      >
        <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center text-emerald-400">
          <i data-lucide="zap" class="w-7 h-7"></i>
        </div>
        <div>
          <p class="text-slate-300 font-medium mb-1">No proxy apps yet</p>
          <p class="text-slate-500 text-sm leading-relaxed max-w-xs">
            Add a proxy app using the
            <span class="text-slate-400">+</span> button on the left. Each app maps route rules to a
            locally running server.
          </p>
        </div>
        <button
          id="add-proxy-cta"
          class="px-4 py-2 rounded-lg bg-emerald-700 hover:bg-emerald-600 text-sm text-white transition-colors"
        >
          Add your first proxy
        </button>
      </div>

      <div id="request-view" class="hidden flex-1 flex flex-col min-h-0"></div>

      <div id="configs-view" class="hidden flex-1 flex flex-col min-h-0">
        <div class="px-4 lg:px-6 py-3 lg:py-4 border-b border-white/5 shrink-0 flex flex-wrap items-center justify-between gap-2">
          <div class="flex items-center gap-2 lg:gap-3 flex-1 min-w-0">
            <p class="text-xs lg:text-sm font-semibold text-slate-300 shrink-0">Configs</p>
            <div class="relative flex-1 min-w-[120px] max-w-xs">
              <i data-lucide="search" class="w-3 h-3 lg:w-3.5 lg:h-3.5 absolute left-2 top-1/2 -translate-y-1/2 text-slate-600 pointer-events-none"></i>
              <input id="configs-search" type="text" placeholder="Search..."
                class="w-full bg-white/5 border border-white/10 rounded pl-6 lg:pl-7 pr-2 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors" />
            </div>
          </div>
          <div class="flex items-center gap-1.5 lg:gap-2">
            <button id="new-config-btn" class="px-2 lg:px-3 py-1.5 rounded-lg text-xs bg-white/5 hover:bg-white/10 text-slate-300 transition-colors whitespace-nowrap">
              + New
            </button>
            <button id="import-file-btn" class="hidden sm:inline-flex px-2 lg:px-3 py-1.5 rounded-lg text-xs bg-white/5 hover:bg-white/10 text-slate-300 transition-colors whitespace-nowrap">
              Import
            </button>
            <button id="import-paste-btn" class="px-2 lg:px-3 py-1.5 rounded-lg text-xs bg-white/5 hover:bg-white/10 text-slate-300 transition-colors whitespace-nowrap">
              Paste
            </button>
          </div>
        </div>
        <div id="configs-list-container" class="flex-1 overflow-y-auto px-6 py-4"></div>

        <!-- Full-page JSON editor (hidden by default, shown inside configs view) -->
        <div id="json-editor-view" class="hidden flex-1 flex flex-col min-h-0">
          <div class="px-6 py-4 border-b border-white/5 shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <button id="json-editor-back" class="p-1.5 rounded text-slate-500 hover:text-slate-200 hover:bg-white/8 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
              </button>
              <p class="text-sm font-semibold text-slate-300">Edit: <span id="json-editor-name" class="text-emerald-400"></span></p>
            </div>
            <div class="flex items-center gap-2">
              <span id="json-editor-hint" class="text-[10px] text-slate-600">Cmd+Enter to save</span>
              <button id="json-editor-save" class="px-3 py-1.5 rounded-lg text-xs bg-emerald-700 hover:bg-emerald-600 text-white transition-colors">Save</button>
            </div>
          </div>
          <div class="flex-1 p-6 min-h-0">
            <textarea id="json-editor-textarea" class="w-full h-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-xs font-mono text-slate-300 focus:outline-none focus:border-white/25 transition-colors resize-none"></textarea>
            <div id="json-editor-error" class="hidden text-xs text-red-400 mt-2"></div>
          </div>
        </div>
      </div>
    </main>

    <div id="aside-divider" class="w-px bg-white/5 shrink-0 relative">
      <button id="aside-toggle" title="Collapse panel"
        class="absolute -left-3 top-4 w-6 h-6 rounded-full bg-[#16181f] border border-white/10 flex items-center justify-center text-slate-500 hover:text-slate-200 hover:bg-white/10 transition-colors z-10 shadow-lg">
        <i data-lucide="panel-right-close" class="w-3 h-3"></i>
      </button>
    </div>

    <aside id="aside-panel" class="w-64 shrink-0 flex flex-col bg-[#09090d] transition-all duration-200">
      <div class="flex-1 flex flex-col gap-6 px-4 py-4">
        <section>
          <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-emerald-400 mb-3">
            <i data-lucide="zap" class="w-5 h-5"></i>
          </div>
          <p class="text-sm font-semibold text-slate-300">Connectio</p>
          <p class="text-xs text-slate-600 mt-0.5 leading-relaxed">Local proxy manager</p>
        </section>

        <section>
          <p class="text-[10px] font-semibold uppercase tracking-widest text-slate-500 mb-3">
            Proxy Server
          </p>
          <div class="flex flex-col gap-3">
            <div class="flex items-center gap-2">
              <span
                id="dot"
                class="w-2 h-2 rounded-full bg-slate-700 transition-colors duration-300"
              ></span>
              <span id="status" class="text-xs text-slate-400">Offline</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-500 w-8 shrink-0">Port</span>
              <input
                id="port"
                type="number"
                value="8080"
                class="flex-1 min-w-0 bg-white/5 border border-white/10 rounded px-2 py-1 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors"
              />
            </div>
            <button
              id="toggle"
              class="w-full py-2 rounded-lg text-sm font-medium bg-emerald-700 hover:bg-emerald-600 text-white transition-colors"
            >
              Start Server
            </button>
          </div>
        </section>
      </div>

      <div class="px-4 py-4 border-t border-white/5 flex flex-col gap-2">
        <p id="config-name-label" class="text-xs text-slate-500 truncate"></p>
        <div class="flex gap-2">
          <button id="save-config-btn" class="flex-1 py-2 rounded-lg text-xs font-medium bg-white/5 hover:bg-white/10 text-slate-300 transition-colors">
            Save
          </button>
          <button id="load-config-btn" class="flex-1 py-2 rounded-lg text-xs font-medium bg-white/5 hover:bg-white/10 text-slate-300 transition-colors">
            Load
          </button>
        </div>
      </div>
    </aside>

    <script>
      // ── Config picker ──────────────────────────────────────────────
      let activeConfigName = null;

      const picker = document.getElementById("config-picker");
      const configListEl = document.getElementById("config-list");
      const configNewBtn = document.getElementById("config-new-btn");
      const configNewForm = document.getElementById("config-new-form");
      const configNewNameInput = document.getElementById("config-new-name");

      async function renderConfigList() {
        configListEl.innerHTML = "";
        const names = await window.connectio.config.list();
        if (names.length === 0) {
          const hint = document.createElement("p");
          hint.className = "text-xs text-slate-600";
          hint.textContent = "No saved configs yet.";
          configListEl.appendChild(hint);
        }
        names.forEach((name) => {
          const row = document.createElement("div");
          row.className = "group flex items-center gap-2";

          const btn = document.createElement("button");
          btn.className = "flex-1 text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-xs text-slate-300 transition-colors";
          btn.textContent = name;
          btn.addEventListener("click", () => loadConfigAndEnter(name));

          const del = document.createElement("button");
          del.className = "text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all text-xs px-1";
          del.textContent = "✕";
          del.title = "Delete config";
          del.addEventListener("click", async () => {
            await window.connectio.config.delete(name);
            if (activeConfigName === name) {
              activeConfigName = null;
              document.getElementById("config-name-label").textContent = "";
            }
            await renderConfigList();
          });

          row.appendChild(btn);
          row.appendChild(del);
          configListEl.appendChild(row);
        });
      }

      async function loadConfigAndEnter(name) {
        await stopServer();
        const data = await window.connectio.config.load(name);
        activeConfigName = name;
        document.getElementById("config-name-label").textContent = name;
        if (data) {
          apps.length = 0;
          data.apps.forEach((a) => apps.push(a));
          if (data.port) document.getElementById("port").value = data.port;
          syncRules();
          renderSidebar();
          if (apps.length > 0) selectApp(apps[0].id);
        }
        picker.classList.add("hidden");
        configsView.classList.add("hidden");
        if (apps.length === 0) {
          emptyState.classList.remove("hidden");
        } else {
          requestView.classList.remove("hidden");
        }
      }

      document.getElementById("config-picker-close").addEventListener("click", () => {
        picker.classList.add("hidden");
      });
      picker.addEventListener("click", (e) => {
        if (e.target === picker) picker.classList.add("hidden");
      });

      function showNewConfigForm() {
        configNewBtn.classList.add("hidden");
        configNewForm.classList.remove("hidden");
        configNewNameInput.value = "";
        configNewNameInput.focus();
      }

      async function confirmNewConfig() {
        const name = configNewNameInput.value.trim();
        if (!name) return;
        await window.connectio.config.save(name, { apps: [], port: 8080 });
        await loadConfigAndEnter(name);
      }

      configNewBtn.addEventListener("click", showNewConfigForm);
      document.getElementById("config-new-cancel").addEventListener("click", () => {
        configNewForm.classList.add("hidden");
        configNewBtn.classList.remove("hidden");
      });
      document.getElementById("config-new-confirm").addEventListener("click", confirmNewConfig);
      configNewNameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") confirmNewConfig();
        if (e.key === "Escape") document.getElementById("config-new-cancel").click();
      });

      async function openConfigPicker() {
        configNewForm.classList.add("hidden");
        configNewBtn.classList.remove("hidden");
        await renderConfigList();
        picker.classList.remove("hidden");
      }

      async function initConfigPicker() {
        const configDir = await window.connectio.config.dir();
        document.getElementById("config-name-label").title = configDir;
      }

      document.getElementById("load-config-btn").addEventListener("click", openConfigsView);

      const saveConfigOverlay = document.getElementById("save-config-overlay");
      const saveConfigNameInput = document.getElementById("save-config-name");

      function openSaveDialog() {
        saveConfigNameInput.value = activeConfigName || "";
        saveConfigOverlay.classList.remove("hidden");
        saveConfigNameInput.focus();
        saveConfigNameInput.select();
      }

      function closeSaveDialog() {
        saveConfigOverlay.classList.add("hidden");
      }

      async function confirmSaveConfig() {
        const name = saveConfigNameInput.value.trim();
        if (!name) return;
        const port = parseInt(document.getElementById("port").value, 10) || 8080;
        const appsToSave = apps.map(({ logs: _, ...rest }) => rest);
        await window.connectio.config.save(name, { apps: appsToSave, port });
        activeConfigName = name;
        document.getElementById("config-name-label").textContent = name;
        closeSaveDialog();
      }

      document.getElementById("save-config-btn").addEventListener("click", openSaveDialog);
      document.getElementById("save-config-cancel").addEventListener("click", closeSaveDialog);
      document.getElementById("save-config-confirm").addEventListener("click", confirmSaveConfig);
      saveConfigOverlay.addEventListener("click", (e) => { if (e.target === saveConfigOverlay) closeSaveDialog(); });
      saveConfigNameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") confirmSaveConfig();
        if (e.key === "Escape") closeSaveDialog();
      });

      // Nav expand / collapse
      const nav = document.getElementById("nav");
      const navToggle = document.getElementById("nav-toggle");
      const navToggleWrap = document.getElementById("nav-toggle-wrap");
      const addProxyBtn = document.getElementById("add-proxy");
      const addProxyLabel = document.getElementById("add-proxy-label");
      let navExpanded = false;

      function syncNavExpanded() {
        nav.style.width = navExpanded ? "210px" : "80px";
        nav.classList.toggle("expanded", navExpanded);

        navToggle.classList.toggle("active", navExpanded);
        navToggleWrap.classList.toggle("justify-start", navExpanded);
        navToggleWrap.classList.toggle("justify-center", !navExpanded);
        navToggle.classList.toggle("w-full", navExpanded);
        navToggle.classList.toggle("justify-start", navExpanded);
        navToggle.classList.toggle("justify-center", !navExpanded);
        navToggle.classList.toggle("px-3", navExpanded);
        document.getElementById("nav-toggle-label").classList.toggle("hidden", !navExpanded);

        addProxyBtn.classList.toggle("w-full", navExpanded);
        addProxyBtn.classList.toggle("justify-start", navExpanded);
        addProxyBtn.classList.toggle("justify-center", !navExpanded);
        addProxyBtn.classList.toggle("px-3", navExpanded);
        addProxyBtn.classList.toggle("mx-auto", !navExpanded);
        addProxyBtn.classList.toggle("w-10", !navExpanded);
        addProxyBtn.classList.toggle("h-10", !navExpanded);
        addProxyLabel.classList.toggle("hidden", !navExpanded);

        renderSidebar();
      }

      navToggle.addEventListener("click", () => {
        navExpanded = !navExpanded;
        syncNavExpanded();
      });

      // ── App state ──────────────────────────────────────────────
      const apps = [];
      let selectedAppId = null;

      // ── Modal ───────────────────────────────────────────────────
      const modalOverlay = document.getElementById("modal-overlay");
      const modalName = document.getElementById("modal-name");
      const modalUrl = document.getElementById("modal-url");
      const modalError = document.getElementById("modal-error");

      function openModal() {
        modalName.value = "";
        modalUrl.value = "";
        modalError.classList.add("hidden");
        modalOverlay.classList.remove("hidden");
        modalName.focus();
      }

      function closeModal() {
        modalOverlay.classList.add("hidden");
      }

      function submitModal() {
        const name = modalName.value.trim();
        const targetUrl = modalUrl.value.trim();
        if (!name || !targetUrl) {
          modalError.textContent = "Both fields are required.";
          modalError.classList.remove("hidden");
          return;
        }
        const app = { id: crypto.randomUUID(), name, targetUrl, enabled: true, rules: [] };
        apps.push(app);
        renderSidebar();
        selectApp(app.id);
        closeModal();
      }

      document.getElementById("modal-cancel").addEventListener("click", closeModal);
      document.getElementById("modal-add").addEventListener("click", submitModal);
      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (e.key === "Enter" && !modalOverlay.classList.contains("hidden")) submitModal();
      });

      // ── Sidebar rendering ────────────────────────────────────────
      const proxyList = document.getElementById("proxy-list");
      const emptyState = document.getElementById("empty-state");

      function renderSidebar() {
        proxyList.innerHTML = "";
        proxyList.className = navExpanded
          ? "flex flex-col gap-2 px-3 flex-1"
          : "flex flex-col gap-2 px-3 flex-1 items-center";
        apps.forEach((app, i) => {
          const isSelected = app.id === selectedAppId;

          if (navExpanded) {
            const row = document.createElement("div");
            row.className = "group relative flex items-center gap-1 w-full";

            const btn = document.createElement("button");
            btn.title = app.name;
            btn.className = `flex-1 h-9 rounded-lg flex items-center gap-2 px-2 transition-colors ${
              isSelected
                ? "bg-emerald-600/15 text-emerald-400"
                : "hover:bg-white/5 text-slate-400 hover:text-slate-200"
            }`;
            const avatar = document.createElement("span");
            avatar.className = `squircle w-6 h-6 flex items-center justify-center text-xs font-semibold shrink-0 ${
              isSelected ? "bg-emerald-600 text-white" : "bg-white/10 text-slate-300"
            }`;
            avatar.textContent = app.name[0].toUpperCase();
            const label = document.createElement("span");
            label.className = "text-xs font-medium whitespace-nowrap overflow-hidden text-ellipsis";
            label.textContent = app.name;
            btn.appendChild(avatar);
            btn.appendChild(label);
            btn.addEventListener("click", () => selectApp(app.id));

            const reorderWrap = document.createElement("div");
            reorderWrap.className = "flex flex-col opacity-0 group-hover:opacity-100 transition-opacity shrink-0";

            const upBtn = document.createElement("button");
            upBtn.textContent = "↑";
            upBtn.title = "Move up";
            upBtn.className = `text-[10px] leading-none py-0.5 px-0.5 transition-colors ${i === 0 ? "text-slate-700 pointer-events-none" : "text-slate-500 hover:text-slate-200"}`;
            upBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              [apps[i - 1], apps[i]] = [apps[i], apps[i - 1]];
              syncRules();
              renderSidebar();
            });

            const downBtn = document.createElement("button");
            downBtn.textContent = "↓";
            downBtn.title = "Move down";
            downBtn.className = `text-[10px] leading-none py-0.5 px-0.5 transition-colors ${i === apps.length - 1 ? "text-slate-700 pointer-events-none" : "text-slate-500 hover:text-slate-200"}`;
            downBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              [apps[i], apps[i + 1]] = [apps[i + 1], apps[i]];
              syncRules();
              renderSidebar();
            });

            reorderWrap.appendChild(upBtn);
            reorderWrap.appendChild(downBtn);
            row.appendChild(btn);
            row.appendChild(reorderWrap);
            proxyList.appendChild(row);
          } else {
            const btn = document.createElement("button");
            btn.title = app.name;
            btn.className = `squircle w-10 h-10 flex items-center justify-center text-sm font-semibold transition-colors ${
              isSelected
                ? "bg-emerald-600 text-white"
                : "bg-white/10 hover:bg-white/15 text-slate-300"
            }`;
            btn.textContent = app.name[0].toUpperCase();
            btn.addEventListener("click", () => selectApp(app.id));
            proxyList.appendChild(btn);

      // ── Log listener (set up once) ───────────────────────────────
      window.connectio.onLog((entry) => {
        const app = apps.find((a) => a.targetUrl === entry.targetUrl);
        if (!app) return;
        app.logs = app.logs || [];
        entry.ts = Date.now();
        app.logs.unshift(entry);
        if (app.id === selectedAppId) appendLogLine(entry);
      });

      function buildLogLine(entry, list) {
        const empty = list.querySelector(".log-empty");
        if (empty) empty.remove();
        const line = document.createElement("div");
        line.className = "flex items-center gap-3 py-1.5 border-b border-white/3 font-mono text-xs";
        const time = new Date(entry.ts || Date.now()).toTimeString().slice(0, 8);
        const statusColor =
          entry.status < 300
            ? "text-emerald-400"
            : entry.status < 500
              ? "text-yellow-400"
              : "text-red-400";
        line.innerHTML = `
          <span class="text-slate-600 shrink-0">${time}</span>
          <span class="text-slate-400 shrink-0 w-10">${entry.method}</span>
          <span class="text-slate-300 flex-1 truncate">${entry.path}</span>
          <span class="${statusColor} shrink-0">${entry.status}</span>
          <span class="text-slate-600 shrink-0">${entry.ms}ms</span>
        `;
        list.prepend(line);
      }

      function appendLogLine(entry) {
        const list = document.getElementById("log-list");
        if (!list) return;
        buildLogLine(entry, list);
      }

      // ── Rules sync ───────────────────────────────────────────────
      function syncRules() {
        const flat = apps.flatMap((app) =>
          app.rules
            .filter((r) => r.enabled)
            .map((r) => ({ matchPath: r.matchPath, targetUrl: app.targetUrl })),
        );
        window.connectio.rules.update(flat);
      }

      // ── App view ─────────────────────────────────────────────────
      const requestView = document.getElementById("request-view");

        const header = document.createElement("div");
        header.className =
          "px-6 py-4 border-b border-white/5 shrink-0 flex items-start justify-between gap-4";
        renderHeader(app, header);

        const body = document.createElement("div");
        body.className = "flex-1 min-h-0 px-6 py-4 flex flex-col gap-4";

        const rulesHeader = document.createElement("div");
        rulesHeader.className = "flex items-center justify-between";

        rulesLabel.textContent = "Route Rules";
        const addRuleBtn = document.createElement("button");
        addRuleBtn.className = "text-xs text-emerald-500 hover:text-emerald-400 transition-colors";
        addRuleBtn.textContent = "+ Add Rule";

        rulesHeader.appendChild(rulesLabel);
        rulesHeader.appendChild(addRuleBtn);

        const rulesList = document.createElement("div");
        rulesList.id = "rules-list";
        rulesList.className = "flex flex-col gap-1";
        renderRulesList(app, rulesList);

        body.appendChild(rulesHeader);
        body.appendChild(rulesList);

        const logsSection = document.createElement("div");
        logsSection.className = "flex-1 flex flex-col min-h-0 gap-2";

        const logsHeader = document.createElement("div");
        logsHeader.className = "flex items-center justify-between shrink-0";
        const logsLabel = document.createElement("p");
        logsLabel.className = "text-[10px] font-semibold uppercase tracking-widest text-slate-500";
        logsLabel.textContent = "Recent Requests";
        logsHeader.appendChild(logsLabel);

        const logList = document.createElement("div");
        logList.id = "log-list";
        logList.className = "flex-1 overflow-y-auto min-h-0";

        const logs = app.logs || [];

        logsSection.appendChild(logList);

      function renderHeader(app, header) {
        header.innerHTML = "";

        const info = document.createElement("div");
        const nameEl = document.createElement("p");
        nameEl.className = "text-sm font-semibold text-slate-300";
        nameEl.textContent = app.name;
        const urlEl = document.createElement("p");
        urlEl.className = "text-xs text-slate-500 mt-0.5";
        urlEl.textContent = app.targetUrl;
        info.appendChild(nameEl);
        info.appendChild(urlEl);

        const actions = document.createElement("div");
        actions.className = "flex items-center gap-1 shrink-0 mt-0.5";

        const editBtn = document.createElement("button");
        editBtn.title = "Edit app";
        editBtn.className =
          "p-1.5 rounded text-slate-500 hover:text-slate-200 hover:bg-white/8 transition-colors";
        const editIcon = document.createElement("i");
        editIcon.setAttribute("data-lucide", "pencil");
        editIcon.className = "w-3.5 h-3.5";
        editBtn.appendChild(editIcon);
        editBtn.addEventListener("click", () => renderHeaderEdit(app, header));

        const delBtn = document.createElement("button");
        delBtn.title = "Delete app";

        delIcon.setAttribute("data-lucide", "trash-2");

      function renderHeaderEdit(app, header) {
        header.innerHTML = "";

        const fields = document.createElement("div");
        fields.className = "flex flex-col gap-2 flex-1";

        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.value = app.name;
        nameInput.className =
          "bg-white/5 border border-white/10 rounded px-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-white/25 transition-colors";

        const urlInput = document.createElement("input");
        urlInput.type = "text";
        urlInput.value = app.targetUrl;
        urlInput.className =
          "bg-white/5 border border-white/10 rounded px-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-white/25 font-mono transition-colors";

        const btns = document.createElement("div");
        btns.className = "flex gap-2";

        const save = document.createElement("button");
        save.className =
          "px-3 py-1 rounded text-xs bg-emerald-700 hover:bg-emerald-600 text-white transition-colors";

        const cancel = document.createElement("button");

          "px-3 py-1 rounded text-xs text-slate-500 hover:text-slate-300 transition-colors";
        cancel.textContent = "Cancel";

        save.addEventListener("click", () => {

          const targetUrl = urlInput.value.trim();

      function deleteApp(appId) {
        const idx = apps.findIndex((a) => a.id === appId);
        apps.splice(idx, 1);
        syncRules();
        selectedAppId = null;
        renderSidebar();
        if (apps.length > 0) {
          selectApp(apps[apps.length - 1].id);
        } else {
          requestView.classList.add("hidden");
          emptyState.classList.remove("hidden");
        }
      }

      function renderRulesList(app, container) {
        container.innerHTML = "";
        if (app.rules.length === 0) {
          const empty = document.createElement("p");
          empty.className = "text-xs text-slate-600";
          empty.textContent = "No rules yet. Add one to start routing traffic.";
          container.appendChild(empty);
          return;
        }
        app.rules.forEach((rule, i) => {
          const row = document.createElement("div");
          row.className =
            "flex items-center gap-2 px-3 py-2 rounded-lg bg-white/3 hover:bg-white/5 group transition-colors";

          // Reorder buttons
          const upBtn = document.createElement("button");
          upBtn.textContent = "↑";
          upBtn.title = "Move up";
          upBtn.className = `text-xs transition-colors ${i === 0 ? "text-slate-700 pointer-events-none" : "text-slate-600 hover:text-slate-300"}`;
          upBtn.addEventListener("click", () => {
            [app.rules[i - 1], app.rules[i]] = [app.rules[i], app.rules[i - 1]];
            syncRules();
            renderRulesList(app, container);
          });

          const downBtn = document.createElement("button");
          downBtn.textContent = "↓";
          downBtn.title = "Move down";
          downBtn.className = `text-xs transition-colors ${i === app.rules.length - 1 ? "text-slate-700 pointer-events-none" : "text-slate-600 hover:text-slate-300"}`;
          downBtn.addEventListener("click", () => {
            [app.rules[i], app.rules[i + 1]] = [app.rules[i + 1], app.rules[i]];
            syncRules();
            renderRulesList(app, container);
          });

          // Enable/disable dot
          const dot = document.createElement("button");
          dot.className = `w-2 h-2 rounded-full shrink-0 transition-colors ${rule.enabled ? "bg-emerald-500" : "bg-slate-600"}`;
          dot.title = rule.enabled ? "Click to disable rule" : "Click to enable rule";
          dot.addEventListener("click", () => {
            rule.enabled = !rule.enabled;
            syncRules();
            renderRulesList(app, container);
          });

          const path = document.createElement("span");
          path.className = `text-xs font-mono flex-1 ${rule.enabled ? "text-slate-300" : "text-slate-600 line-through"}`;
          path.textContent = rule.matchPath;

          const del = document.createElement("button");
          del.className =
            "text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all text-xs";
          del.textContent = "✕";
          del.addEventListener("click", () => {
            app.rules = app.rules.filter((r) => r.id !== rule.id);
            syncRules();
            renderRulesList(app, container);
          });

          row.appendChild(upBtn);
          row.appendChild(downBtn);
          row.appendChild(dot);
          row.appendChild(path);
          row.appendChild(del);
          container.appendChild(row);
        });
      }

      function showRuleInput(app, rulesList, addBtn) {
        addBtn.classList.add("hidden");
        const form = document.createElement("div");
        form.className = "flex items-center gap-2";
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "/api/*";
        input.className =
          "flex-1 bg-white/5 border border-white/10 rounded px-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-white/25 font-mono transition-colors";
        const confirm = document.createElement("button");
        confirm.className =
          "px-3 py-1.5 rounded text-xs bg-emerald-700 hover:bg-emerald-600 text-white transition-colors";
        confirm.textContent = "Add";
        const cancel = document.createElement("button");
        cancel.className =
          "px-3 py-1.5 rounded text-xs text-slate-500 hover:text-slate-300 transition-colors";
        cancel.textContent = "Cancel";

        function commit() {
          const val = input.value.trim();
          if (!val) return;
          app.rules.push({ id: crypto.randomUUID(), matchPath: val, enabled: true });
          syncRules();
          form.remove();
          addBtn.classList.remove("hidden");
          renderRulesList(app, document.getElementById("rules-list"));
        }

        confirm.addEventListener("click", commit);
        cancel.addEventListener("click", () => {
          form.remove();
          addBtn.classList.remove("hidden");
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") commit();
          if (e.key === "Escape") cancel.click();
        });

        form.appendChild(input);
        form.appendChild(confirm);
        form.appendChild(cancel);
        rulesList.insertAdjacentElement("afterend", form);
        input.focus();
      }

      function selectApp(id) {
        selectedAppId = id;
        renderSidebar();
        emptyState.classList.add("hidden");
        requestView.classList.remove("hidden");
        renderAppView(id);
      }

      function onAddProxy() {
        openModal();
      }
      document.getElementById("add-proxy").addEventListener("click", onAddProxy);
      document.getElementById("add-proxy-cta").addEventListener("click", onAddProxy);

      // Proxy server toggle
      const dot = document.getElementById("dot");
      const status = document.getElementById("status");
      const portInput = document.getElementById("port");
      const btn = document.getElementById("toggle");
      let running = false;

      async function stopServer() {
        if (!running) return;
        await window.connectio.proxy.stop();
        running = false;
        dot.className = "w-2 h-2 rounded-full bg-slate-700 transition-colors duration-300";
        status.textContent = "Offline";
        btn.textContent = "Start Server";
        btn.className = btn.className.replace("bg-red-800 hover:bg-red-700", "bg-emerald-700 hover:bg-emerald-600");
        portInput.disabled = false;
        portInput.className = portInput.className.replace(" opacity-40 cursor-not-allowed", "");
      }

      btn.addEventListener("click", async () => {
        btn.disabled = true;

        if (!running) {
          const port = parseInt(portInput.value);
          if (isNaN(port) || port < 1024 || port > 65535) {
            status.textContent = "Invalid port (1024–65535)";
            btn.disabled = false;
            return;
          }
          const result = await window.connectio.proxy.start(port);
          if (result.ok) {
            running = true;
            dot.className = "w-2 h-2 rounded-full bg-emerald-400 transition-colors duration-300";
            status.textContent = `Online — :${result.port}`;
            btn.textContent = "Stop Server";
            btn.className = btn.className.replace(
              "bg-emerald-700 hover:bg-emerald-600",
              "bg-red-800 hover:bg-red-700",
            );
            portInput.disabled = true;
            portInput.className += " opacity-40 cursor-not-allowed";
          } else {
            status.textContent = `Error: ${result.error}`;
          }
        } else {
          await stopServer();
        }

        btn.disabled = false;
      });

      // ── Debounce ──────────────────────────────────────────────────
      function debounce(fn, ms) {
        let timer;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), ms);
        };
      }

      // ── Configs view state ────────────────────────────────────────
      const configsView = document.getElementById("configs-view");
      const configsListContainer = document.getElementById("configs-list-container");

      async function openConfigsView() {
        await stopServer();
        configsView.classList.remove("hidden");
        requestView.classList.add("hidden");
        emptyState.classList.add("hidden");
        selectedAppId = null;
        await renderConfigsList();
      }

      function getRelativeTime(ms) {
        const diff = Date.now() - ms;
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return `${mins}m ago`;
        const hours = Math.floor(mins / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        return `${days}d ago`;
      }

      function formatSize(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
      }

      async function renderConfigsList() {
        configsListContainer.innerHTML = "";
        const configs = await window.connectio.config.listDetailed();
        if (configs.length === 0) {
          const empty = document.createElement("div");
          empty.className = "flex flex-col items-center justify-center h-full text-center gap-4";
          empty.innerHTML = `
            <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center text-slate-500">
              <i data-lucide="file-json" class="w-7 h-7"></i>
            </div>
            <p class="text-slate-400 font-medium">No configs yet</p>
            <p class="text-slate-600 text-sm max-w-xs">Create a new config, paste JSON, or import a file to get started.</p>
          `;
          configsListContainer.appendChild(empty);
          lucide.createIcons();
          return;
        }

        const searchTerm = (document.getElementById("configs-search").value || "").toLowerCase();
        const filtered = searchTerm ? configs.filter((c) => c.name.toLowerCase().includes(searchTerm)) : configs;

        const list = document.createElement("div");
        list.className = "flex flex-col gap-2 w-full";

        if (filtered.length === 0 && searchTerm) {
          const empty = document.createElement("div");
          empty.className = "flex flex-col items-center justify-center h-40 text-center gap-2";
          empty.innerHTML = `<p class="text-slate-500 text-sm">No configs match "${searchTerm}"</p>`;
          list.appendChild(empty);
          configsListContainer.appendChild(list);
          return;
        }

        filtered.forEach((cfg) => {
          const row = document.createElement("div");
          row.className = "group flex items-center gap-3 px-4 py-3 rounded-xl bg-white/3 hover:bg-white/5 transition-colors cursor-pointer border border-transparent hover:border-white/10";

          const dot = document.createElement("div");
          dot.className = "w-2 h-2 rounded-full bg-emerald-500 shrink-0";

          const info = document.createElement("div");
          info.className = "flex-1 min-w-0";

          const nameRow = document.createElement("div");
          nameRow.className = "flex items-center gap-2";

          const nameWrap = document.createElement("div");
          nameWrap.className = "flex items-center gap-1.5 cursor-text hover:bg-white/5 rounded px-1 -ml-1 transition-colors";
          nameWrap.title = "Click to rename";

          const nameEl = document.createElement("span");
          nameEl.className = "text-sm font-medium text-slate-300";
          nameEl.textContent = cfg.name;

          const pencilIcon = document.createElement("i");
          pencilIcon.setAttribute("data-lucide", "pencil");
          pencilIcon.className = "w-3 h-3 text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity";

          nameWrap.appendChild(nameEl);
          nameWrap.appendChild(pencilIcon);
          nameWrap.addEventListener("click", (e) => {
            e.stopPropagation();
            startRename(cfg, row, nameEl);
          });

          const meta = document.createElement("span");
          meta.className = "text-[10px] text-slate-600";
          const relTime = getRelativeTime(cfg.lastModified);
          meta.textContent = `${cfg.appCount} app${cfg.appCount !== 1 ? 's' : ''} · ${cfg.routeCount} route${cfg.routeCount !== 1 ? 's' : ''} · port ${cfg.port} · ${relTime}`;

          nameRow.appendChild(nameEl);
          nameRow.appendChild(meta);
          info.appendChild(nameRow);

          if (cfg.note) {
            const noteRow = document.createElement("div");
            noteRow.className = "text-[10px] text-slate-500 italic truncate mt-0.5";
            noteRow.textContent = cfg.note;
            info.appendChild(noteRow);

          actions.className = "flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0";

          const editBtn = createActionBtn("Edit JSON", "file-code", () => openFullPageEditor(cfg));
          const shareBtn = createActionBtn("Share", "share-2", null, true, cfg);
          const deleteBtn = createActionBtn("Delete", "trash-2", () => confirmDelete(cfg, row));

          actions.appendChild(editBtn);
          actions.appendChild(shareBtn);
          actions.appendChild(deleteBtn);

          row.appendChild(dot);
          row.appendChild(info);
          row.appendChild(actions);

          row.addEventListener("click", (e) => {

      // ── Import flows ──────────────────────────────────────────────
      const importOverlay = document.getElementById("import-json-overlay");
      const importNameInput = document.getElementById("import-config-name");
      const importTextarea = document.getElementById("import-json-textarea");
      const importPreview = document.getElementById("import-preview");
      const importError = document.getElementById("import-error");
      const importValidateBtn = document.getElementById("import-json-validate");
      const importConfirmBtn = document.getElementById("import-json-confirm");
      const importCancelBtn = document.getElementById("import-json-cancel");
      let importValidData = null;

      function openImportOverlay(prefilledName, prefilledJson) {
        importNameInput.value = prefilledName || "";
        importTextarea.value = prefilledJson || "";
        importPreview.classList.add("hidden");
        importError.classList.add("hidden");
        importValidData = null;
        importConfirmBtn.disabled = true;
        importOverlay.classList.remove("hidden");
        if (!prefilledJson) importTextarea.focus();
        else importNameInput.focus();
      }

      function closeImportOverlay() {
        importOverlay.classList.add("hidden");
      }

      importValidateBtn.addEventListener("click", () => {
        const jsonStr = importTextarea.value.trim();
        importError.classList.add("hidden");
        importPreview.classList.add("hidden");
        importValidData = null;
        importConfirmBtn.disabled = true;

        if (!jsonStr) {
          importError.textContent = "Please paste JSON first.";
          importError.classList.remove("hidden");
          return;
        }

        let data;
        try {
          data = JSON.parse(jsonStr);
        } catch (err) {
          importError.textContent = `Invalid JSON: ${err.message}`;
          importError.classList.remove("hidden");
          return;
        }

        if (!data || typeof data !== "object" || !Array.isArray(data.apps) || typeof data.port !== "number") {
          importError.textContent = 'Invalid config format: expected { "apps": [...], "port": number }';
          importError.classList.remove("hidden");
          return;
        }

        importValidData = data;
        const appCount = data.apps.length;
        const routeCount = data.apps.reduce((sum, a) => sum + (a.rules || []).length, 0);
        importPreview.classList.remove("hidden");
        importPreview.innerHTML = `<span class="text-slate-500">Preview:</span> <span class="text-slate-300">${appCount} app${appCount !== 1 ? 's' : ''}, ${routeCount} route${routeCount !== 1 ? 's' : ''}, port ${data.port}</span>`;
        importConfirmBtn.disabled = false;
      });

      importConfirmBtn.addEventListener("click", async () => {
        const name = importNameInput.value.trim();
        if (!name) {
          importError.textContent = "Please enter a config name.";
          importError.classList.remove("hidden");
          return;
        }
        if (!importValidData) {
          importError.textContent = "Please validate the JSON first.";
          importError.classList.remove("hidden");
          return;
        }
        try {
          const jsonStr = JSON.stringify(importValidData);
          await window.connectio.config.import(jsonStr, name);
          showToast(`Imported "${name}"`, "success");
          closeImportOverlay();
          await loadConfigAndEnter(name);
        } catch (err) {
          importError.textContent = err.message;
          importError.classList.remove("hidden");
        }
      });

      importCancelBtn.addEventListener("click", closeImportOverlay);
      importOverlay.addEventListener("click", (e) => { if (e.target === importOverlay) closeImportOverlay(); });
      importNameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") importConfirmBtn.click();
        if (e.key === "Escape") closeImportOverlay();
      });

      document.getElementById("import-paste-btn").addEventListener("click", () => {
        openImportOverlay("", "");
      });

      document.getElementById("import-file-btn").addEventListener("click", async () => {
        try {
          const result = await window.connectio.config.importFile();
          if (!result) return;
          openImportOverlay(result.name, result.json);
        } catch (err) {
          showToast(err.message || "Failed to import file", "error");
        }
      });

      document.getElementById("new-config-btn").addEventListener("click", () => {
        openImportOverlay("", JSON.stringify({ apps: [], port: 8080 }, null, 2));
      });

      // ── Full-page JSON Editor ─────────────────────────────────────
      const jsonEditorView = document.getElementById("json-editor-view");
      const jsonEditorTextarea = document.getElementById("json-editor-textarea");
      const jsonEditorName = document.getElementById("json-editor-name");
      const jsonEditorError = document.getElementById("json-editor-error");
      const jsonEditorSave = document.getElementById("json-editor-save");
      const jsonEditorBack = document.getElementById("json-editor-back");
      let jsonEditorConfigName = null;

      async function openFullPageEditor(cfg) {
        try {
          const result = await window.connectio.config.export(cfg.name);
          jsonEditorConfigName = cfg.name;
          jsonEditorName.textContent = cfg.name;
          jsonEditorTextarea.value = result.json;
          jsonEditorError.classList.add("hidden");
          configsListContainer.classList.add("hidden");
          jsonEditorView.classList.remove("hidden");
          jsonEditorTextarea.focus();
        } catch (err) {
          showToast(err.message || "Failed to load config", "error");
        }
      }

      function closeFullPageEditor() {
        jsonEditorView.classList.add("hidden");
        configsListContainer.classList.remove("hidden");
        jsonEditorConfigName = null;
        renderConfigsList();
      }

      jsonEditorSave.addEventListener("click", async () => {
        const jsonStr = jsonEditorTextarea.value.trim();
        jsonEditorError.classList.add("hidden");
        if (!jsonStr) {
          jsonEditorError.textContent = "JSON cannot be empty.";
          jsonEditorError.classList.remove("hidden");
          return;
        }
        let data;
        try {
          data = JSON.parse(jsonStr);
        } catch (err) {
          jsonEditorError.textContent = `Invalid JSON: ${err.message}`;
          jsonEditorError.classList.remove("hidden");
          return;
        }
        if (!data || typeof data !== "object" || !Array.isArray(data.apps) || typeof data.port !== "number") {
          jsonEditorError.textContent = 'Invalid config format: expected { "apps": [...], "port": number }';
          jsonEditorError.classList.remove("hidden");
          return;
        }
        try {
          await window.connectio.config.save(jsonEditorConfigName, data);
          showToast(`Saved "${jsonEditorConfigName}"`, "success");
          closeFullPageEditor();
        } catch (err) {
          jsonEditorError.textContent = err.message;
          jsonEditorError.classList.remove("hidden");
        }
      });

      jsonEditorBack.addEventListener("click", closeFullPageEditor);
      jsonEditorTextarea.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") jsonEditorSave.click();
      });

      // ── Config search ─────────────────────────────────────────────
      document.getElementById("configs-search").addEventListener("input", debounce(() => {
        if (!configsView.classList.contains("hidden")) renderConfigsList();
      }, 150));

      // ── Delete confirmation ───────────────────────────────────────
      let deleteTimer = null;

      function confirmDelete(cfg, row) {
        if (deleteTimer) {
          clearTimeout(deleteTimer);
          deleteTimer = null;
          doDelete(cfg, row);
          return;
        }

        const delBtn = row.querySelector('button[title="Delete"]');
        if (delBtn) {
          delBtn.classList.add("text-red-400", "bg-red-900/20");
          delBtn.innerHTML = '<i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i>';
          lucide.createIcons();
        }

        showToast("Click Delete again to confirm", "info", 4000);

        deleteTimer = setTimeout(() => {
          if (delBtn) {
            delBtn.classList.remove("text-red-400", "bg-red-900/20");
            delBtn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i>';
            lucide.createIcons();
          }
          deleteTimer = null;
        }, 4000);
      }

      async function doDelete(cfg, row) {
        try {
          await window.connectio.config.delete(cfg.name);
          if (activeConfigName === cfg.name) {
            activeConfigName = null;
            document.getElementById("config-name-label").textContent = "";
          }
          showToast(`Deleted "${cfg.name}"`, "success");
          await renderConfigsList();
        } catch (err) {
          showToast(err.message || "Delete failed", "error");
        }
      }

      // ── Rename ────────────────────────────────────────────────────
      function startRename(cfg, row, nameEl) {
        const origName = cfg.name;
        const input = document.createElement("input");
        input.type = "text";
        input.value = origName;
        input.className = "bg-white/5 border border-white/10 rounded px-2 py-0.5 text-sm text-slate-300 focus:outline-none focus:border-white/25 transition-colors w-40";
        input.dataset.orig = origName;

        nameEl.replaceWith(input);
        input.focus();
        input.select();

        async function commit() {
          const newName = input.value.trim();
          if (!newName || newName === origName) {
            input.replaceWith(nameEl);
            return;
          }
          try {
            await window.connectio.config.rename(origName, newName);
            cfg.name = newName;
            nameEl.textContent = newName;
            showToast(`Renamed to "${newName}"`, "success");
          } catch (err) {
            showToast(err.message || "Rename failed", "error");
          }
          input.replaceWith(nameEl);
        }

        function cancel() {
          input.replaceWith(nameEl);
        }

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          if (e.key === "Escape") { e.preventDefault(); cancel(); }
        });
        input.addEventListener("blur", commit);
      }

      // ── Share / Export ────────────────────────────────────────────
      let activeShareMenu = null;

      function openShareMenu(anchorEl, cfg) {
        if (activeShareMenu) activeShareMenu.remove();

        const menu = document.createElement("div");
        menu.className = "bg-[#1a1d26] border border-white/10 rounded-lg py-1 shadow-xl flex flex-col min-w-[140px]";

        const copyBtn = document.createElement("button");
        copyBtn.className = "flex items-center gap-2 px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 transition-colors text-left";
        copyBtn.innerHTML = '<i data-lucide="clipboard" class="w-3.5 h-3.5 shrink-0"></i> Copy JSON';
        copyBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          try {
            const result = await window.connectio.config.export(cfg.name);
            await navigator.clipboard.writeText(result.json);
            showToast("Copied to clipboard", "success");
          } catch (err) {
            showToast(err.message || "Failed to copy", "error");
          }
          menu.remove();
          activeShareMenu = null;
        });

        const saveBtn = document.createElement("button");
        saveBtn.className = "flex items-center gap-2 px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 transition-colors text-left";
        saveBtn.innerHTML = '<i data-lucide="download" class="w-3.5 h-3.5 shrink-0"></i> Save as file';
        saveBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          try {
            const result = await window.connectio.config.export(cfg.name);
            const saveResult = await window.connectio.config.exportFile(cfg.name, result.json);
            if (saveResult.ok) {
              showToast("File saved", "success");
            }
          } catch (err) {
            showToast(err.message || "Failed to export", "error");
          }
          menu.remove();
          activeShareMenu = null;
        });

        menu.appendChild(copyBtn);
        menu.appendChild(saveBtn);

        const rect = anchorEl.getBoundingClientRect();
        menu.style.position = 'fixed';
        menu.style.top = rect.top + 'px';
        menu.style.left = (rect.left - 148) + 'px';

        document.body.appendChild(menu);
        activeShareMenu = menu;

        function closeMenu(e) {
          if (!menu.contains(e.target) && e.target !== anchorEl) {
            menu.remove();
            activeShareMenu = null;
            document.removeEventListener('click', closeMenu);
          }
        }
        setTimeout(() => document.addEventListener('click', closeMenu), 0);
      }

      function createActionBtn(label, icon, onClick, isShare, cfg) {
        const btn = document.createElement("button");
        btn.title = label;
        btn.className = "p-1.5 rounded text-slate-600 hover:text-slate-200 hover:bg-white/8 transition-colors";
        const i = document.createElement("i");
        i.setAttribute("data-lucide", icon);
        i.className = "w-3.5 h-3.5";
        btn.appendChild(i);

        if (isShare) {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            openShareMenu(btn, cfg);
          });
        } else if (onClick) {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            onClick();
          });
        }

        return btn;
      }

      // ── Toast system ──────────────────────────────────────────────
      function showToast(message, type, duration) {
        type = type || 'success';
        duration = duration || 2500;
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        const bg = type === 'error' ? 'bg-red-800' : type === 'info' ? 'bg-blue-800' : 'bg-emerald-800';
        toast.className = `pointer-events-auto ${bg} text-white text-xs px-4 py-2.5 rounded-lg shadow-lg transition-all duration-300 flex items-center gap-2`;
        toast.textContent = message;
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(8px)';
        container.appendChild(toast);
        requestAnimationFrame(() => {
          toast.style.opacity = '1';
          toast.style.transform = 'translateY(0)';
        });
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(8px)';
          setTimeout(() => toast.remove(), 300);
        }, duration);
      }

      // ── Aside panel collapse ──────────────────────────────────────
      const asidePanel = document.getElementById("aside-panel");
      const asideToggle = document.getElementById("aside-toggle");
      let asideCollapsed = false;

      asideToggle.addEventListener("click", () => {
        asideCollapsed = !asideCollapsed;
        asidePanel.style.width = asideCollapsed ? "0px" : "256px";
        asidePanel.classList.toggle("overflow-hidden", asideCollapsed);
        const icon = asideToggle.querySelector("i");
        icon.setAttribute("data-lucide", asideCollapsed ? "panel-right-open" : "panel-right-close");
        lucide.createIcons();
        asideToggle.title = asideCollapsed ? "Expand panel" : "Collapse panel";
      });

      lucide.createIcons();
      initConfigPicker();
    </script>
  </body>
</html>
